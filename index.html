<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>16:9 Pro Map Video Generator</title>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { 
            margin: 0; padding: 0; background: #050505; font-family: -apple-system, sans-serif; 
            overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh;
        }
        
        /* Auto-Scaling Perfect 16:9 Container */
        #video-container {
            position: relative;
            width: 100vw;
            height: 56.25vw; 
            max-height: 100vh;
            max-width: 177.77vh; 
            margin: auto;
            background: #000;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        #globeViz { width: 100%; height: 100%; }
        
        /* High-Visibility Yellow & Black Labels */
        .broadcast-label {
            background: #FFD700; /* Bright Warning Yellow */
            border-left: 5px solid #000;
            color: #000;
            padding: 10px 16px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.9);
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            
            /* Animation */
            opacity: 0;
            transform: translate(-50%, -100%) scale(0.9);
            animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Black pulsing dot next to text */
        .broadcast-label::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background: #000;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0,0,0,0.4);
            animation: pulse-black 1.5s infinite;
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translate(-50%, -150%) scale(1); }
        }
        
        @keyframes pulse-black { 
            0% { opacity: 1; transform: scale(1); } 
            50% { opacity: 0.5; transform: scale(1.2); } 
            100% { opacity: 1; transform: scale(1); } 
        }

        /* Mobile UI Panel */
        #ui-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.9); padding: 15px; border-radius: 16px;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            color: white; display: flex; flex-direction: column; gap: 8px;
            width: 90%; max-width: 500px; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.15);
            transition: opacity 0.4s ease; z-index: 20;
        }
        .row { display: flex; gap: 8px; }
        .input-group { display: flex; flex-direction: column; flex: 1; }
        label { font-size: 9px; color: #bbb; margin-bottom: 3px; text-transform: uppercase; font-weight: bold;}
        input { 
            background: rgba(0,0,0,0.7); border: 1px solid #444; color: white; 
            padding: 8px; border-radius: 6px; font-size: 13px; width: 100%; box-sizing: border-box;
        }
        button { 
            background: #FFD700; color: #000; border: none; padding: 12px; 
            border-radius: 8px; font-size: 15px; font-weight: 900; cursor: pointer; margin-top: 5px;
        }
        
        #tap-to-restore { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }
        
        #recording-indicator {
            position: absolute; top: 20px; right: 20px; color: #ff3b30; font-weight: bold;
            font-size: 14px; display: none; align-items: center; gap: 6px; z-index: 30;
            background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 20px;
        }
        .red-dot { width: 10px; height: 10px; background: #ff3b30; border-radius: 50%; animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="video-container">
    <div id="globeViz"></div>
    <div id="recording-indicator"><div class="red-dot"></div> REC</div>
    <div id="tap-to-restore" onclick="restoreUI()"></div>
</div>

<div id="ui-panel">
    <div class="row">
        <div class="input-group"><label>Start Label</label><input type="text" id="startLabel" value="Iran"></div>
        <div class="input-group"><label>Lat</label><input type="number" id="startLat" value="32.4279"></div>
        <div class="input-group"><label>Lng</label><input type="number" id="startLng" value="53.6880"></div>
    </div>
    <div class="row">
        <div class="input-group"><label>End Label</label><input type="text" id="endLabel" value="Diego Garcia Air Base"></div>
        <div class="input-group"><label>Lat</label><input type="number" id="endLat" value="-7.3195"></div>
        <div class="input-group"><label>Lng</label><input type="number" id="endLng" value="72.4149"></div>
    </div>
    <button onclick="recordAndFly()">🔴 Record MP4 & Fly</button>
</div>

<script>
    const container = document.getElementById('video-container');
    const elem = document.getElementById('globeViz');
    
    // Using the highest res single texture available in this library
    const world = Globe()(elem)
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
        .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
        .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
        .pointOfView({ lat: 32.4279, lng: 53.6880, altitude: 0.8 }); // Starting closer

    function resizeMap() {
        world.width(container.clientWidth);
        world.height(container.clientHeight);
    }
    window.addEventListener('resize', resizeMap);
    window.addEventListener('orientationchange', () => setTimeout(resizeMap, 200));
    setTimeout(resizeMap, 100);

    let mediaRecorder;
    let recordedChunks = [];

    function updateMapData(sLat, sLng, sLabel, eLat, eLng, eLabel) {
        // High visibility yellow dots
        world.pointsData([ { lat: sLat, lng: sLng }, { lat: eLat, lng: eLng } ])
        .pointColor(() => '#FFD700').pointAltitude(0.01).pointRadius(0.15);

        world.htmlElementsData([
            { lat: sLat, lng: sLng, name: sLabel, alt: 0.06 }, // Altitude added to prevent label glitching into planet
            { lat: eLat, lng: eLng, name: eLabel, alt: 0.06 }
        ])
        .htmlAltitude(d => d.alt) // Forces HTML labels to float above the surface
        .htmlElement(d => {
            const el = document.createElement('div');
            el.innerHTML = d.name;
            el.className = 'broadcast-label';
            return el;
        });
    }

    updateMapData(32.4279, 53.6880, "Iran", -7.3195, 72.4149, "Diego Garcia Air Base");

    function startRecording() {
        const canvas = elem.querySelector('canvas');
        const stream = canvas.captureStream(60); 
        
        let selectedMimeType = 'video/mp4'; 
        if (!MediaRecorder.isTypeSupported('video/mp4')) {
            selectedMimeType = 'video/webm; codecs=vp9'; 
        }

        mediaRecorder = new MediaRecorder(stream, { mimeType: selectedMimeType, videoBitsPerSecond: 8000000 });
        mediaRecorder.ondataavailable = (event) => { if (event.data.size > 0) recordedChunks.push(event.data); };
        
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: selectedMimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = 'Map_Animation_16x9.mp4'; 
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 100);
            
            recordedChunks = [];
            document.getElementById('recording-indicator').style.display = 'none';
            restoreUI();
        };

        mediaRecorder.start();
        document.getElementById('recording-indicator').style.display = 'flex';
    }

    function recordAndFly() {
        const sLat = parseFloat(document.getElementById('startLat').value);
        const sLng = parseFloat(document.getElementById('startLng').value);
        const sLabel = document.getElementById('startLabel').value;
        const eLat = parseFloat(document.getElementById('endLat').value);
        const eLng = parseFloat(document.getElementById('endLng').value);
        const eLabel = document.getElementById('endLabel').value;

        document.getElementById('ui-panel').style.opacity = '0';
        document.getElementById('ui-panel').style.pointerEvents = 'none';
        document.getElementById('tap-to-restore').style.display = 'block';

        // 1. Start much closer to the ground (altitude 0.4)
        world.pointOfView({ lat: sLat, lng: sLng, altitude: 0.4 }, 0);
        updateMapData(sLat, sLng, sLabel, eLat, eLng, eLabel);
        
        setTimeout(() => {
            startRecording();

            // Draw solid yellow glowing path
            world.arcsData([{
                startLat: sLat, startLng: sLng, endLat: eLat, endLng: eLng,
                color: ['rgba(255, 215, 0, 0.1)', '#FFD700']
            }])
            .arcColor('color').arcDashLength(0.6).arcDashGap(0.2).arcDashAnimateTime(2000).arcStroke(1.5);

            setTimeout(() => {
                const midLat = (sLat + eLat) / 2;
                const midLng = (sLng + eLng) / 2;
                
                // 2. Pan up to see the path, but stay relatively low (altitude 1.6)
                world.pointOfView({ lat: midLat, lng: midLng, altitude: 1.6 }, 2500); 
                
                setTimeout(() => {
                    // 3. Dive bomb close to the final destination (altitude 0.3)
                    world.pointOfView({ lat: eLat, lng: eLng, altitude: 0.3 }, 3000); 
                    
                    // Stop recording a little bit after it lands
                    setTimeout(() => mediaRecorder.stop(), 4500); 
                }, 2500);
            }, 800);
        }, 500);
    }

    function restoreUI() {
        document.getElementById('ui-panel').style.opacity = '1';
        document.getElementById('ui-panel').style.pointerEvents = 'auto';
        document.getElementById('tap-to-restore').style.display = 'none';
    }
</script>

</body>
</html>
