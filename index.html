<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>16:9 Precision Map Video Generator</title>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { 
            margin: 0; padding: 0; background: #050505; font-family: -apple-system, sans-serif; 
            overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh;
        }
        
        #video-container {
            position: relative; width: 100vw; height: 56.25vw; max-height: 100vh;
            max-width: 177.77vh; margin: auto; background: #000; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        #globeViz { width: 100%; height: 100%; }

        /* Mobile UI Panel */
        #ui-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.95); padding: 15px; border-radius: 16px;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            color: white; display: flex; flex-direction: column; gap: 8px;
            width: 90%; max-width: 500px; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.1);
            transition: opacity 0.4s ease; z-index: 20; box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }
        .row { display: flex; gap: 8px; }
        .input-group { display: flex; flex-direction: column; flex: 1; }
        label { font-size: 9px; color: #888; margin-bottom: 3px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px;}
        input, select { 
            background: #000; border: 1px solid #333; color: white; 
            padding: 8px; border-radius: 6px; font-size: 13px; width: 100%; box-sizing: border-box;
        }
        input:focus { border-color: #666; outline: none; }
        button { border: none; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 900; cursor: pointer; margin-top: 5px; transition: background 0.2s;}
        
        #tap-to-restore { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }
        
        #recording-indicator {
            position: absolute; top: 20px; right: 20px; color: #ff3b30; font-weight: bold;
            font-size: 14px; display: none; align-items: center; gap: 6px; z-index: 30;
            background: rgba(0,0,0,0.8); padding: 6px 12px; border-radius: 20px; border: 1px solid #ff3b30;
        }
        .red-dot { width: 10px; height: 10px; background: #ff3b30; border-radius: 50%; animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

<div id="video-container">
    <div id="globeViz"></div>
    <div id="recording-indicator"><div class="red-dot"></div> REC</div>
    <div id="tap-to-restore" onclick="restoreUI()"></div>
</div>

<div id="ui-panel">
    <div class="row">
        <div class="input-group">
            <label>Visual Style</label>
            <select id="themeSelector" onchange="applyTheme()">
                <option value="broadcast">News Broadcast (Yellow Path / Blue Earth)</option>
                <option value="tactical">Clean Military (Red Path / Dark Earth)</option>
            </select>
        </div>
    </div>
    <div class="row">
        <div class="input-group"><label>Start Label</label><input type="text" id="startLabel" value="Iran"></div>
        <div class="input-group"><label>Lat</label><input type="number" id="startLat" value="32.4279" step="any"></div>
        <div class="input-group"><label>Lng</label><input type="number" id="startLng" value="53.6880" step="any"></div>
    </div>
    <div class="row">
        <div class="input-group"><label>End Label</label><input type="text" id="endLabel" value="Diego Garcia Air Base"></div>
        <div class="input-group"><label>Lat</label><input type="number" id="endLat" value="-7.3195" step="any"></div>
        <div class="input-group"><label>Lng</label><input type="number" id="endLng" value="72.4149" step="any"></div>
    </div>
    <button id="recordBtn" onclick="recordAndFly()">🔴 Record MP4 & Fly</button>
</div>

<script>
    const container = document.getElementById('video-container');
    const elem = document.getElementById('globeViz');
    
    // Theme Engine
    const themes = {
        broadcast: {
            globeImg: 'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg',
            bgImg: 'https://unpkg.com/three-globe/example/img/night-sky.png',
            accentColor: '#FFD700', 
            textColor: '#FFFFFF', 
            camSpeedMultiplier: 1.0, 
            btnColor: '#FFD700',
            btnText: '#000'
        },
        tactical: {
            globeImg: 'https://unpkg.com/three-globe/example/img/earth-dark.jpg',
            bgImg: null, 
            accentColor: '#FF3B30', 
            textColor: '#FFFFFF', 
            camSpeedMultiplier: 0.7, 
            btnColor: '#FF3B30',
            btnText: '#FFF'
        }
    };

    let activeTheme = 'broadcast';

    const world = Globe()(elem)
        .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
        .pointOfView({ lat: 32.4279, lng: 53.6880, altitude: 0.8 });

    function resizeMap() {
        world.width(container.clientWidth);
        world.height(container.clientHeight);
    }
    window.addEventListener('resize', resizeMap);
    window.addEventListener('orientationchange', () => setTimeout(resizeMap, 200));
    setTimeout(resizeMap, 100);

    let mediaRecorder;
    let recordedChunks = [];
    let isRecording = false;

    function applyTheme() {
        activeTheme = document.getElementById('themeSelector').value;
        const t = themes[activeTheme];

        world.globeImageUrl(t.globeImg);
        
        if (t.bgImg) {
            world.backgroundImageUrl(t.bgImg);
        } else {
            world.backgroundImageUrl('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='); 
        }

        const btn = document.getElementById('recordBtn');
        btn.style.background = t.btnColor;
        btn.style.color = t.btnText;

        refreshMapData();
    }

    function refreshMapData() {
        const sLat = parseFloat(document.getElementById('startLat').value);
        const sLng = parseFloat(document.getElementById('startLng').value);
        const sLabel = document.getElementById('startLabel').value;
        const eLat = parseFloat(document.getElementById('endLat').value);
        const eLng = parseFloat(document.getElementById('endLng').value);
        const eLabel = document.getElementById('endLabel').value;
        
        const t = themes[activeTheme];

        world.labelsData([
            { lat: sLat + 1.2, lng: sLng, text: sLabel },
            { lat: eLat + 1.2, lng: eLng, text: eLabel }
        ])
        .labelLat('lat').labelLng('lng').labelText('text').labelSize(0.8) 
        .labelDotRadius(0).labelColor(() => t.textColor).labelResolution(8).labelAltitude(0.01);

        const crosshairSize = 1.2;
        const crosshairs = [
            [ {lat: sLat - crosshairSize, lng: sLng}, {lat: sLat + crosshairSize, lng: sLng} ],
            [ {lat: sLat, lng: sLng - crosshairSize}, {lat: sLat, lng: sLng + crosshairSize} ],
            [ {lat: eLat - crosshairSize, lng: eLng}, {lat: eLat + crosshairSize, lng: eLng} ],
            [ {lat: eLat, lng: eLng - crosshairSize}, {lat: eLat, lng: eLng + crosshairSize} ]
        ];

        world.pathsData(crosshairs).pathPoints(d => d).pathPointLat(p => p.lat).pathPointLng(p => p.lng)
            .pathColor(() => t.accentColor).pathResolution(2).pathStroke(1.5);

        world.ringsData([ { lat: sLat, lng: sLng }, { lat: eLat, lng: eLng } ])
            .ringColor(() => t.accentColor).ringMaxRadius(1.5).ringPropagationSpeed(1.0).ringRepeatPeriod(1000);
    }

    applyTheme();

    function startRecording() {
        const glCanvas = elem.querySelector('canvas');
        
        // --- THE FIX: 2D Mirroring to bypass Safari's WebGL freeze bug ---
        const recordCanvas = document.createElement('canvas');
        recordCanvas.width = glCanvas.width;
        recordCanvas.height = glCanvas.height;
        const ctx = recordCanvas.getContext('2d');
        
        isRecording = true;
        
        // Rapidly paint the 3D map to the invisible 2D canvas
        function renderLoop() {
            if (!isRecording) return;
            ctx.drawImage(glCanvas, 0, 0);
            requestAnimationFrame(renderLoop);
        }
        requestAnimationFrame(renderLoop);

        // Record the 2D canvas instead
        const stream = recordCanvas.captureStream(60); 
        // -----------------------------------------------------------------

        let selectedMimeType = 'video/mp4'; 
        // Explicitly request the most stable iOS H264 codec if available
        if (MediaRecorder.isTypeSupported('video/mp4; codecs="avc1.42E01E"')) {
            selectedMimeType = 'video/mp4; codecs="avc1.42E01E"';
        } else if (!MediaRecorder.isTypeSupported('video/mp4')) {
            selectedMimeType = 'video/webm; codecs=vp9'; 
        }

        mediaRecorder = new MediaRecorder(stream, { mimeType: selectedMimeType, videoBitsPerSecond: 8000000 });
        
        // Force chunks every 100ms to keep Safari's encoder awake
        mediaRecorder.ondataavailable = (event) => { if (event.data.size > 0) recordedChunks.push(event.data); };
        
        mediaRecorder.onstop = () => {
            isRecording = false; // Kill the 2D render loop
            
            const blob = new Blob(recordedChunks, { type: selectedMimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `Map_${activeTheme.toUpperCase()}_16x9.mp4`; 
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 100);
            
            recordedChunks = [];
            document.getElementById('recording-indicator').style.display = 'none';
            restoreUI();
        };

        mediaRecorder.start(100); // 100ms timeslices
        document.getElementById('recording-indicator').style.display = 'flex';
    }

    function recordAndFly() {
        const sLat = parseFloat(document.getElementById('startLat').value);
        const sLng = parseFloat(document.getElementById('startLng').value);
        const eLat = parseFloat(document.getElementById('endLat').value);
        const eLng = parseFloat(document.getElementById('endLng').value);
        const t = themes[activeTheme];

        document.getElementById('ui-panel').style.opacity = '0';
        document.getElementById('ui-panel').style.pointerEvents = 'none';
        document.getElementById('tap-to-restore').style.display = 'block';

        world.pointOfView({ lat: sLat, lng: sLng, altitude: 0.4 }, 0);
        refreshMapData();
        
        setTimeout(() => {
            startRecording();

            world.arcsData([{
                startLat: sLat, startLng: sLng, endLat: eLat, endLng: eLng,
                color: [t.accentColor, t.accentColor]
            }])
            .arcColor('color')
            .arcStroke(1.5); 

            const phase1Time = 2500 * t.camSpeedMultiplier;
            const phase2Time = 3000 * t.camSpeedMultiplier;

            setTimeout(() => {
                const midLat = (sLat + eLat) / 2;
                const midLng = (sLng + eLng) / 2;
                
                world.pointOfView({ lat: midLat, lng: midLng, altitude: 1.6 }, phase1Time); 
                
                setTimeout(() => {
                    world.pointOfView({ lat: eLat, lng: eLng, altitude: 0.3 }, phase2Time); 
                    
                    setTimeout(() => mediaRecorder.stop(), phase2Time + 3000); 
                }, phase1Time);
            }, 800);
        }, 500);
    }

    function restoreUI() {
        document.getElementById('ui-panel').style.opacity = '1';
        document.getElementById('ui-panel').style.pointerEvents = 'auto';
        document.getElementById('tap-to-restore').style.display = 'none';
        world.arcsData([]); 
    }
</script>

</body>
</html>
