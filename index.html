<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal CFR Map Engine</title>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://unpkg.com/mp4-muxer/build/mp4-muxer.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #050505; font-family: -apple-system, sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #video-container { position: relative; width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 177.77vh; margin: auto; background: #000; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        #globeViz { width: 100%; height: 100%; }

        /* Universal Master Panel */
        #ui-panel {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.95); padding: 15px; border-radius: 16px;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            color: white; display: flex; flex-direction: column; gap: 8px;
            width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; box-sizing: border-box; 
            border: 1px solid rgba(255,255,255,0.1); transition: opacity 0.4s ease; z-index: 20; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }
        #ui-panel::-webkit-scrollbar { display: none; }
        
        .row { display: flex; gap: 8px; }
        .input-group { display: flex; flex-direction: column; flex: 1; }
        label { font-size: 9px; color: #888; margin-bottom: 3px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px;}
        input, select { background: #000; border: 1px solid #333; color: white; padding: 8px; border-radius: 6px; font-size: 13px; width: 100%; box-sizing: border-box; }
        button { border: none; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 900; cursor: pointer; margin-top: 5px; transition: background 0.2s;}
        .secondary-btn { background: #1d1d1d; color: #d7d7d7; border: 1px solid #444; }
        .secondary-btn:hover { background: #2a2a2a; }
        .prompt-block { background: rgba(0,0,0,0.4); border: 1px solid #2f2f2f; border-radius: 8px; padding: 10px; }
        .prompt-block p { margin: 0; color: #d0d0d0; font-size: 12px; line-height: 1.45; white-space: pre-line; }
        .prompt-title { font-size: 10px; color: #888; margin-bottom: 6px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.6px; }
        
        .toggle-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 6px; border: 1px solid #333; }
        .toggle-row label { margin: 0; font-size: 11px; color: #ccc;}
        input[type="checkbox"] { width: 18px; height: 18px; accent-color: #ff3b30; }

        #tap-to-restore { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }
        
        #rendering-overlay {
            position: absolute; top: 20px; right: 20px; color: #fff; font-weight: bold; font-size: 12px; display: none; align-items: center; gap: 8px; z-index: 30;
            background: rgba(255, 59, 48, 0.9); padding: 6px 14px; border-radius: 20px; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(255, 59, 48, 0.4);
        }
        .spinner { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="video-container">
    <div id="globeViz"></div>
    <div id="rendering-overlay"><div class="spinner"></div> ENCODING CFR MP4</div>
    <div id="tap-to-restore" onclick="restoreUI()"></div>
</div>

<div id="ui-panel">
    <div class="row">
        <div class="input-group">
            <label>Visual Style</label>
            <select id="themeSelector" onchange="applyTheme()">
                <option value="broadcast">News Broadcast (Blue Earth)</option>
                <option value="tactical">Clean Military (Dark Earth)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Background</label>
            <select id="bgSelector" onchange="applyTheme()">
                <option value="space">Cinematic Space</option>
                <option value="chroma">Green Screen (Chroma Key)</option>
            </select>
        </div>
    </div>
    
    <div class="toggle-row">
        <label>Show Geopolitical Borders</label>
        <input type="checkbox" id="toggleBorders" checked onchange="applyTheme()">
    </div>

    <div class="row">
        <div class="input-group"><label>Start Label</label><input type="text" id="startLabel" value="Iran"></div>
        <div class="input-group"><label>Lat</label><input type="number" id="startLat" value="32.4279" step="any"></div>
        <div class="input-group"><label>Lng</label><input type="number" id="startLng" value="53.6880" step="any"></div>
    </div>
    <div class="row">
        <div class="input-group"><label>End Label</label><input type="text" id="endLabel" value="Diego Garcia"></div>
        <div class="input-group"><label>Lat</label><input type="number" id="endLat" value="-7.3195" step="any"></div>
        <div class="input-group"><label>Lng</label><input type="number" id="endLng" value="72.4149" step="any"></div>
    </div>

    <div class="row" style="margin-top: 5px;">
        <div class="input-group">
            <label>Flight Pacing</label>
            <select id="speedSelector">
                <option value="0.8">Fast (TikTok / Shorts)</option>
                <option value="1.5" selected>Cinematic (News Standard)</option>
                <option value="2.5">Documentary (Slow & Deep)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Export Engine</label>
            <select id="qualitySelector">
                <option value="1080">1080p CFR (Max)</option>
                <option value="720">720p CFR (Fast)</option>
            </select>
        </div>
    </div>

    <button id="recordBtn" onclick="recordAndFly()">RENDER UNIVERSAL MP4</button>
    <button class="secondary-btn" onclick="copyViralReelPrompt()">COPY UK MILITARY REEL PROMPT</button>

    <div class="prompt-block">
        <div class="prompt-title">Viral Reel Prompt Pack</div>
        <p id="viralReelPromptPreview"></p>
    </div>
</div>

<script>
    if (typeof VideoEncoder === 'undefined') { alert("Update iOS to 16.4+ for the Pro WebCodecs Engine."); }

    const container = document.getElementById('video-container');
    const elem = document.getElementById('globeViz');
    
    const themes = {
        broadcast: { globeImg: 'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', accentColor: '#FFD700', textColor: '#FFFFFF', camSpeed: 1.0, btnColor: '#FFD700', btnText: '#000', borderColor: 'rgba(255, 215, 0, 0.25)' },
        tactical: { globeImg: 'https://unpkg.com/three-globe/example/img/earth-dark.jpg', accentColor: '#FF3B30', textColor: '#FFFFFF', camSpeed: 0.8, btnColor: '#FF3B30', btnText: '#FFF', borderColor: 'rgba(255, 59, 48, 0.35)' }
    };

    let activeTheme = 'broadcast';
    let geoJsonData = null;

    const world = Globe()(elem).bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png').pointOfView({ lat: 32.4279, lng: 53.6880, altitude: 0.8 });

    fetch('https://raw.githubusercontent.com/vasturiano/globe.gl/master/example/datasets/ne_110m_admin_0_countries.geojson')
        .then(res => res.json()).then(data => { geoJsonData = data.features; applyTheme(); });

    let muxer, videoEncoder, frameCount = 0, isRecording = false, lastCaptureTime = 0;
    const TARGET_FPS = 30;
    const viralReelPromptPack = {
        masterPrompt: 'Cinematic vertical military edit (9:16). Royal Navy Type 45 destroyer HMS Dragon cutting through rough ocean at sunrise, Welsh dragon emblem on the bow. Dramatic slow-motion water spray. Cut to RAF Typhoon fighter jets roaring through clouds at Mach speed, afterburners glowing orange. Massive bass-drop transitions with fast cuts. Royal Navy Wildcat helicopter launching from the deck of HMS Dragon. Close-up of Sea Viper missile launching from the destroyer with smoke trails. British F-35B stealth jet taking off from aircraft carrier deck at night with glowing runway lights. Cinematic drone shots of British soldiers and warships. Dark cinematic color grading, teal-orange military style. Fast-paced brainrot style editing like viral war edits on social media. Epic dramatic lighting, film grain, motion blur, slow motion explosions in distance. Patriotic atmosphere, British flag patches, stormy sky. Ultra realistic, IMAX cinematic look, 4k detail, dramatic contrast.',
        reelStructure: [
            '0-2s | Bass rise | HMS Dragon cutting waves | Text: "THE UNITED KINGDOM"',
            '2-5s | Jets screaming overhead | Text: "WHEN THE WORLD BURNS…"',
            '5-8s | Missile launch / warship weapons | Text: "…BRITAIN RESPONDS."',
            '8-12s | Typhoon flyby / F-35 takeoff | Text: "ROYAL NAVY | RAF"',
            '12-15s | Huge bass drop + warship/jets montage | Text: "RULE THE WAVES 🇬🇧"'
        ],
        music: [
            'After Dark x Sweater Weather phonk remix',
            'Metamorphosis — Interworld',
            'Memory Reboot — VØJ & Narvent',
            'Hard phonk / trap military edits'
        ]
    };

    function resizeMap() { 
        if(isRecording) return; 
        world.width(container.clientWidth); world.height(container.clientHeight); 
    }
    window.addEventListener('resize', resizeMap); 
    window.addEventListener('orientationchange', () => setTimeout(resizeMap, 200)); 
    setTimeout(resizeMap, 100);

    function applyTheme() {
        activeTheme = document.getElementById('themeSelector').value;
        const bgType = document.getElementById('bgSelector').value;
        const showBorders = document.getElementById('toggleBorders').checked;
        const t = themes[activeTheme];

        world.globeImageUrl(t.globeImg);
        
        if (bgType === 'chroma') {
            world.backgroundImageUrl(null); world.backgroundColor('#00FF00');
        } else {
            world.backgroundColor('#000000'); world.backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png');
        }

        if (showBorders && geoJsonData) {
            world.polygonsData(geoJsonData).polygonCapColor(() => 'rgba(0,0,0,0)').polygonSideColor(() => 'rgba(0,0,0,0)').polygonStrokeColor(() => t.borderColor);
        } else {
            world.polygonsData([]);
        }

        const btn = document.getElementById('recordBtn'); btn.style.background = t.btnColor; btn.style.color = t.btnText;
        refreshMapData();
    }

    function formatViralPromptPreview() {
        const structure = viralReelPromptPack.reelStructure.map(item => `• ${item}`).join('\n');
        const music = viralReelPromptPack.music.map(item => `• ${item}`).join('\n');
        return `MASTER PROMPT\n${viralReelPromptPack.masterPrompt}\n\nREEL STRUCTURE (15–20s)\n${structure}\n\nMUSIC OPTIONS\n${music}`;
    }

    function copyViralReelPrompt() {
        const packedPrompt = formatViralPromptPreview();
        navigator.clipboard.writeText(packedPrompt)
            .then(() => {
                const copyBtn = document.querySelector('.secondary-btn');
                const originalLabel = copyBtn.textContent;
                copyBtn.textContent = 'PROMPT COPIED';
                setTimeout(() => { copyBtn.textContent = originalLabel; }, 1500);
            })
            .catch(() => alert('Unable to access clipboard in this browser session.'));
    }

    document.getElementById('viralReelPromptPreview').textContent = formatViralPromptPreview();

    function refreshMapData() {
        const sLat = parseFloat(document.getElementById('startLat').value); const sLng = parseFloat(document.getElementById('startLng').value); const sLabel = document.getElementById('startLabel').value;
        const eLat = parseFloat(document.getElementById('endLat').value); const eLng = parseFloat(document.getElementById('endLng').value); const eLabel = document.getElementById('endLabel').value;
        const t = themes[activeTheme];

        world.pointsData([{ lat: sLat, lng: sLng }, { lat: eLat, lng: eLng }]).pointColor(() => t.accentColor).pointAltitude(0.01).pointRadius(0.3);
        world.labelsData([{ lat: sLat, lng: sLng + 1.5, text: sLabel }, { lat: eLat, lng: eLng + 1.5, text: eLabel }]).labelLat('lat').labelLng('lng').labelText('text').labelSize(0.8).labelDotRadius(0).labelColor(() => t.textColor).labelResolution(8).labelAltitude(0.01);
    }

    applyTheme();

    async function startRecording() {
        const glCanvas = elem.querySelector('canvas');
        const quality = parseInt(document.getElementById('qualitySelector').value);
        const targetWidth = quality === 1080 ? 1920 : 1280;
        const targetHeight = quality === 1080 ? 1080 : 720;
        
        const recordCanvas = document.createElement('canvas');
        recordCanvas.width = targetWidth; recordCanvas.height = targetHeight;
        const ctx = recordCanvas.getContext('2d', { willReadFrequently: true });

        muxer = new Mp4Muxer.Muxer({ target: new Mp4Muxer.ArrayBufferTarget(), video: { codec: 'avc', width: targetWidth, height: targetHeight }, fastStart: 'in-memory' });

        videoEncoder = new VideoEncoder({ output: (chunk, meta) => muxer.addVideoChunk(chunk, meta), error: e => console.error("WebCodecs Error:", e) });
        videoEncoder.configure({ codec: 'avc1.42E028', width: targetWidth, height: targetHeight, bitrate: 10_000_000, framerate: TARGET_FPS });

        frameCount = 0; isRecording = true; lastCaptureTime = performance.now();

        function renderLoop(currentTime) {
            if (!isRecording) return;
            requestAnimationFrame(renderLoop);

            if (currentTime - lastCaptureTime >= (1000 / TARGET_FPS)) {
                lastCaptureTime = currentTime;
                ctx.drawImage(glCanvas, 0, 0, targetWidth, targetHeight);
                const frame = new VideoFrame(recordCanvas, { timestamp: (frameCount * 1000000) / TARGET_FPS, duration: 1000000 / TARGET_FPS });
                videoEncoder.encode(frame, { keyFrame: frameCount % TARGET_FPS === 0 });
                frame.close(); 
                frameCount++;
            }
        }
        
        requestAnimationFrame(renderLoop);
        document.getElementById('rendering-overlay').style.display = 'flex';
    }

    async function stopRecording() {
        isRecording = false; 
        document.getElementById('rendering-overlay').innerHTML = "SAVING MP4...";
        
        await videoEncoder.flush();
        muxer.finalize();
        
        const buffer = muxer.target.buffer;
        const blob = new Blob([buffer], { type: 'video/mp4' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.style.display = 'none'; a.href = url;
        const q = document.getElementById('qualitySelector').value;
        const bg = document.getElementById('bgSelector').value;
        a.download = `Map_${activeTheme.toUpperCase()}_${bg.toUpperCase()}_${q}p_CFR.mp4`; 
        document.body.appendChild(a); a.click();
        
        setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 100);
        document.getElementById('rendering-overlay').style.display = 'none';
        document.getElementById('rendering-overlay').innerHTML = '<div class="spinner"></div> ENCODING CFR MP4';
        restoreUI();
    }

    function recordAndFly() {
        const sLat = parseFloat(document.getElementById('startLat').value); const sLng = parseFloat(document.getElementById('startLng').value);
        const eLat = parseFloat(document.getElementById('endLat').value); const eLng = parseFloat(document.getElementById('endLng').value);
        const t = themes[activeTheme];
        
        // Grab the user's selected speed multiplier
        const speedMultiplier = parseFloat(document.getElementById('speedSelector').value);

        document.getElementById('ui-panel').style.opacity = '0'; document.getElementById('ui-panel').style.pointerEvents = 'none'; document.getElementById('tap-to-restore').style.display = 'block';

        world.pointOfView({ lat: sLat, lng: sLng, altitude: 0.4 }, 0);
        refreshMapData();
        
        setTimeout(() => {
            startRecording();

            world.arcsData([{ startLat: sLat, startLng: sLng, endLat: eLat, endLng: eLng, color: [t.accentColor, t.accentColor] }]).arcColor('color').arcStroke(1.5); 

            // Calculate the new, slower flight times
            const phase1Time = 3000 * t.camSpeed * speedMultiplier;
            const phase2Time = 4000 * t.camSpeed * speedMultiplier;

            setTimeout(() => {
                const midLat = (sLat + eLat) / 2; const midLng = (sLng + eLng) / 2;
                world.pointOfView({ lat: midLat, lng: midLng, altitude: 1.6 }, phase1Time); 
                
                setTimeout(() => {
                    world.pointOfView({ lat: eLat, lng: eLng, altitude: 0.3 }, phase2Time); 
                    
                    // Keep the 3 second dead-stop hold at the end so you have video padding
                    setTimeout(() => stopRecording(), phase2Time + 3000); 
                }, phase1Time);
            }, 800);
        }, 500);
    }

    function restoreUI() {
        document.getElementById('ui-panel').style.opacity = '1'; document.getElementById('ui-panel').style.pointerEvents = 'auto'; document.getElementById('tap-to-restore').style.display = 'none';
        world.arcsData([]); 
    }
</script>

</body>
</html>
